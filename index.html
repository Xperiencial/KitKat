<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css?v=1">
</head>
<body>
    
    <div class="invitation-canvas">
        <video id="heroVideo" class="video" autoplay loop muted playsinline>
            <source src="video/InvitacionEventoKitKat.mp4" type="video/mp4">
        </video>

        <div id="playOverlay" class="play-overlay">
            <div class="play-overlay__text">Toca para reproducir con sonido</div>
        </div>

        <!-- <div class="content-wrapper">
            <img class="kat" id="" src="imagenes/Kat.png" alt="Kat Piece">
            <img class="kit" id="" src="imagenes/Kit.png" alt="Kit Piece">
        </div> -->
    </div>

    <script>
        const video = document.getElementById('heroVideo');
        const overlay = document.getElementById('playOverlay');

        overlay.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                video.play().catch(() => {});
            }
            overlay.classList.add('hidden');
        });
    </script>
</body>
</html>
